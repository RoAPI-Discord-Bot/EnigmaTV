name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias enigma-key -storepass enigmatv2026 -keypass enigmatv2026 -dname "CN=EnigmaTV, OU=EnigmaTV, O=EnigmaTV, L=Unknown, S=Unknown, C=US"
          
          echo "================================================"
          echo "KEY_STORE_PASSWORD: enigmatv2026"
          echo "KEY_ALIAS: enigma-key"
          echo "KEY_PASSWORD: enigmatv2026"
          echo "================================================"
          echo "KEYSTORE_BASE64 (Copy everything below this line):"
          base64 release.jks | tr -d '\n'
          echo ""
          echo "================================================"

name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias enigma-key -storepass enigmatv2026 -keypass enigmatv2026 -dname "CN=EnigmaTV, OU=EnigmaTV, O=EnigmaTV, L=Unknown, S=Unknown, C=US"

          base64 -w 0 release.jks > keystore_base64.txt

          echo "Keystore generated. File size: $(stat -c%s release.jks) bytes"
          echo "Base64 length: $(stat -c%s keystore_base64.txt) characters"

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keystore-secrets
          path: |
            release.jks
            keystore_base64.txt
          retention-days: 1

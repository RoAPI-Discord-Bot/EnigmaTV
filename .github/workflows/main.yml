name: Android CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Write local.properties
        run: echo "sdk.dir=\${ANDROID_SDK_ROOT}" >> local.properties

      - name: Build release APK
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: \${{ secrets.KEYSTORE_BASE64 }}
          alias: \${{ secrets.KEY_ALIAS }}
          keyStorePassword: \${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: \${{ secrets.KEY_PASSWORD }}

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v\${{ env.VERSION_NAME }}
          name: EnigmaTV v\${{ env.VERSION_NAME }}
          files: \${{steps.sign_app.outputs.signedReleaseFile}}
          draft: false
          prerelease: false

      - name: Upload APK (Fallback to GoFile)
        if: failure()
        run: |
          APK_PATH="\${{steps.sign_app.outputs.signedReleaseFile}}"
          echo "GitHub storage failed or full. Uploading $APK_PATH to GoFile..."
          
          # 1. Get an available server to upload to
          SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['servers'][0]['name'])")
          
          # 2. Upload the file
          RESPONSE=$(curl -F "file=@$APK_PATH" "https://$SERVER.gofile.io/contents/uploadfile")
          
          # 3. Safely extract and print the link
          echo $RESPONSE | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              if data['status'] == 'ok':
                  print('\n--------------------------------------------------')
                  print('DOWNLOAD LINK: ' + data['data']['downloadPage'])
                  print('--------------------------------------------------\n')
              else:
                  print('GoFile Upload Failed: ' + str(data))
                  sys.exit(1)
          except Exception as e:
              print('Error parsing GoFile response: ' + str(e))
              sys.exit(1)
          "

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore

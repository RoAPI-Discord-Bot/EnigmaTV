name: Android CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Write local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 -d -i > app/keystore.jks

      - name: Verify Keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "Keystore file size: $(stat -c%s app/keystore.jks) bytes"
          keytool -list -v -keystore app/keystore.jks -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS"

      - name: Build release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: EnigmaTV v${{ env.VERSION_NAME }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false

      - name: Upload APK to GoFile
        if: always()
        run: |
          APK_PATH=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found (build likely failed before producing one). Skipping GoFile upload."
            exit 0
          fi
          echo "Uploading $APK_PATH to GoFile..."
          
          # 1. Get an available server to upload to
          SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['servers'][0]['name'])")
          
          # 2. Upload the file
          RESPONSE=$(curl -F "file=@$APK_PATH" "https://$SERVER.gofile.io/contents/uploadfile")
          
          # 3. Safely extract and print the link
          echo $RESPONSE | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              if data['status'] == 'ok':
                  print('\n--------------------------------------------------')
                  print('DOWNLOAD LINK: ' + data['data']['downloadPage'])
                  print('--------------------------------------------------\n')
              else:
                  print('GoFile Upload Failed: ' + str(data))
                  sys.exit(1)
          except Exception as e:
              print('Error parsing GoFile response: ' + str(e))
              sys.exit(1)
          "

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
